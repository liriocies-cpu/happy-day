<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel 3D</title>

<style>
.scene, .a3d { display: grid }

.scene {
	overflow: hidden;
	perspective: 35em;
	mask: linear-gradient(90deg, #0000, red 20% 80%, #0000);
}

.a3d {
	place-self: center;
	transform-style: preserve-3d;
	animation: ry 60s linear infinite;
}

@keyframes ry { to { transform: rotateY(360deg); } }

.card {
	--w: 17.5em;
	--ba: calc(360deg / var(--n));
	grid-area: 1/1;
	width: var(--w);
	aspect-ratio: 7/10;
	object-fit: cover;
	border-radius: 1.5em;
	backface-visibility: hidden;

	transform:
		rotateY(calc(var(--i) * var(--ba)))
		translateZ(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(calc(0.5 * var(--ba)))));
}

html, body {
	display: grid;
	height: 100%;
	background: black;
}
</style>
</head>

<body>

<div class="scene">
  <div class="a3d" id="carousel"></div>
</div>

<script>
// ====== DATA ======
const DATA = [
'https://i.postimg.cc/yNm5FyRv/ce9477de8f34ad89e087f0e4b50d5d35.gif',
'https://i.postimg.cc/QMQPpJ7k/a3ea1d42f39cb6a573301d2ff123247d.gif',

'https://i.postimg.cc/pTPSk5Yv/58b2a99873f77398f7e6ea2cdcee6d44_(3).gif',
'https://i.postimg.cc/7Lj62Dg7/0740b0d9de0c753177adfee36b620ad7.gif',
'https://i.postimg.cc/KjyDQPDg/ed885821c5200e1cca84ba2a19f75e30.gif',
'https://i.postimg.cc/sx99LMTB/7f564f5f389c4170aaaadfdbfaafd4fc.gif',
'https://i.postimg.cc/qqdxQsxh/4de845c0318b05ffc9e60067b15fc25f.gif',
'https://i.postimg.cc/rsLNg1Nd/33add5ea972456f1e4c834101fe48391.gif',
'https://i.postimg.cc/zfJ8g6gk/f47f93d3eb146dd5b05f3b82fe1eda8a.gif',

];

// mezclar
DATA.sort(() => Math.random() - 0.5);

const container = document.getElementById("carousel");
container.style.setProperty("--n", DATA.length);

// crear imágenes
DATA.forEach((src, i) => {
	const img = document.createElement("img");
	img.src = src;
	img.className = "card";
	img.style.setProperty("--i", i);
	container.appendChild(img);
});

// ====== AUDIO ======
const audio = new Audio("https://files.catbox.moe/tc3gjb.mp3");
audio.loop = true;

document.body.addEventListener('click', () => {
	audio.play();
}, { once: true });

</script>

</body>
</html>
